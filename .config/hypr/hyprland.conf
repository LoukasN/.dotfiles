# Steam submenus fix
windowrule = match:title ^()$ class:^(steam)$, stay_focused on
windowrule = match:title ^()$ class:^(steam)$, min_size 1 1 

# P-P rules
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 40% 40%
windowrule = match:title ^(Picture-in-Picture)$, no_dim on
windowrule = match:title ^(Picture-in-Picture)$, rounding 0
windowrule = match:title ^(Picture-in-Picture)$, border_size 0

# Remove dimming for certain windows
windowrule = match:class ^(com.stremio.stremio)$, no_dim on
windowrule = match:title (.*- YouTube —.*), no_dim on
windowrule = match:title (.*www.youtube.com.*), no_dim on
windowrule = match:title (.*- Twitch —.*), no_dim on
windowrule = match:title (Netflix.*), no_dim on
windowrule = match:title (.*| Disney+.*), no_dim on

# Virtual machine to workspace 10
windowrule = match:class virt-manager, workspace 10
windowrule = match:class virt-manager, fullscreen on

# Audio setting floating
windowrule = match:initial_title ^(Volume Control)$, float on
windowrule = match:initial_title ^(Volume Control)$, pin on
windowrule = match:initial_title ^(Volume Control)$, size 50% 50%
windowrule = match:initial_title ^(Volume Control)$, move 961 44
windowrule = match:initial_title ^(Volume Control)$, border_size 0

#  __  __ ___ ____   ____ 
# |  \/  |_ _/ ___| / ___|
# | |\/| || |\___ \| |    
# | |  | || | ___) | |___ 
# |_|  |_|___|____/ \____|
                        
misc {
	force_default_wallpaper = 0 
	disable_hyprland_logo = true
	# Lowers the amount of sent frames when nothing is happening on-screen
	vfr = 1
	vrr = 1
	key_press_enables_dpms = true
}

ecosystem {
	no_update_news = true
	enforce_permissions = 1
}
