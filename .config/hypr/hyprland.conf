source = ~/.config/hypr/variables.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/visuals.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/permissions.conf


#  ___                   _   
# |_ _|_ __  _ __  _   _| |_ 
#  | || '_ \| '_ \| | | | __|
#  | || | | | |_) | |_| | |_ 
# |___|_| |_| .__/ \__,_|\__|
#           |_|              

input {
    kb_layout = us, gr
	kb_options = grp:alt_shift_toggle, caps:escape 
    follow_mouse = 1
    repeat_rate = 25
    repeat_delay = 250
    touchpad {
        natural_scroll = yes
		tap-to-click = true
    }
    sensitivity = 0 
	numlock_by_default = true
	scroll_method = 2fg
}

cursor {
    inactive_timeout = 30
    no_hardware_cursors = true
}

gestures {
    workspace = on
    gesture = 3, horizontal, workspace
    workspace_swipe_cancel_ratio = 0.1
    workspace_swipe_distance = 200
    workspace_swipe_min_speed_to_force = 2
}


#  _                            _       
# | |    __ _ _   _  ___  _   _| |_ ___ 
# | |   / _` | | | |/ _ \| | | | __/ __|
# | |__| (_| | |_| | (_) | |_| | |_\__ \
# |_____\__,_|\__, |\___/ \__,_|\__|___/
#             |___/                     

dwindle {
	# master switch for pseudotiling
	pseudotile = yes
	# you probably want this
    preserve_split = yes 
	# 1) Split in any direction based on mouse. 2) Split left/top. 3) Split right/bottom
	force_split = 2 
	# New window depending on cursor placement
	smart_split = false 
	# Resizing determined by mouse position (true) / tilling position (false)
	smart_resizing = false 
	# Scale of special windows
	special_scale_factor = 0.98
}


